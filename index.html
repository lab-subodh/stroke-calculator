<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stroke Rehab & Recovery Tool - Numerical Input</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #004a99;
            --background: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --border: #d1d9e0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--background);
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 20px;
        }

        h2 { color: var(--primary); text-align: center; border-bottom: 2px solid var(--border); padding-bottom: 15px; }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 80px;
            align-items: center;
            margin-bottom: 12px;
            padding: 10px;
            background: #fafafa;
            border: 1px solid var(--border);
            border-radius: 6px;
        }

        .input-label { font-weight: 600; font-size: 0.95rem; color: var(--primary); }
        .input-label small { display: block; font-weight: 400; color: #666; font-size: 0.8rem; }

        input[type=number] {
            width: 100%;
            padding: 8px;
            border: 2px solid var(--border);
            border-radius: 4px;
            font-size: 1rem;
            text-align: center;
        }

        input[type=number]:focus { border-color: var(--primary); outline: none; }

        .chart-container {
            background: white;
            padding: 20px;
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        .results-summary {
            grid-column: span 2;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .result-card {
            background: #e8f4fd;
            border: 2px solid var(--primary);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .result-score { font-size: 2.5rem; font-weight: 900; color: #1a1a1a; margin: 5px 0; }
        .result-category { font-weight: bold; padding: 6px 12px; border-radius: 5px; display: inline-block; }

        .cat-low { background: #ffebee; color: #c62828; }
        .cat-mod { background: #fff8e1; color: #f57f17; }
        .cat-high { background: #e8f5e9; color: #2e7d32; }

        @media (max-width: 850px) {
            .main-layout, .results-summary { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Stroke Sarathi: Recovery Assessment Tool</h2>
    
    <div class="main-layout">
        <!-- Numerical Input Section -->
        <div>
            <p style="color: #666; font-size: 0.9rem; margin-bottom: 20px;">
                Enter values between <b>0 and 100</b> for each domain based on the patient's current status.
            </p>
            <div id="inputs-container"></div>
        </div>

        <!-- Spider Chart Visualization -->
        <div class="chart-container">
            <h3 style="color: var(--primary); text-align: center; margin-top: 0;">Recovery Visualization</h3>
            <canvas id="spiderChart"></canvas>
        </div>
    </div>

    <!-- Final Scores -->
    <div class="results-summary">
        <div class="result-card">
            <div style="font-weight: bold; color: var(--primary);">Rehab Potential Index (RPI)</div>
            <div class="result-score" id="rpi-score">50.0</div>
            <div class="result-category" id="rpi-category">Moderate</div>
        </div>

        <div class="result-card">
            <div style="font-weight: bold; color: var(--primary);">Global Recovery Score (GRS)</div>
            <div class="result-score" id="grs-score">50.0</div>
            <div class="result-category" id="grs-category">Low Stage</div>
        </div>
    </div>
</div>

<script>
    const fields = [
        { id: 'cognition', label: 'Cognition', help: 'Alertness and command following' },
        { id: 'endurance', label: 'Endurance', help: 'Time can participate in therapy' },
        { id: 'sensation', label: 'Sensation', help: 'Feeling in affected limbs' },
        { id: 'mobility', label: 'Walking Mobility', help: 'Walking independence (FAC)' },
        { id: 'stiffness', label: 'Muscle Stiffness', help: 'Resistance felt (MAS Score)' },
        { id: 'movement', label: 'Movement Ability', help: 'Strength and task function' },
        { id: 'daily_living', label: 'Daily Independence', help: 'FIM Score equivalent' }
    ];

    const container = document.getElementById('inputs-container');
    fields.forEach(f => {
        container.innerHTML += `
            <div class="input-group">
                <span class="input-label">
                    ${f.label}
                    <small>${f.help}</small>
                </span>
                <input type="number" id="${f.id}" min="0" max="100" value="50" oninput="updateCalculations()">
            </div>
        `;
    });

    const ctx = document.getElementById('spiderChart').getContext('2d');
    let spiderChart = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: fields.map(f => f.label),
            datasets: [{
                label: 'Patient Metrics',
                data: [50, 50, 50, 50, 50, 50, 50],
                backgroundColor: 'rgba(0, 74, 153, 0.2)',
                borderColor: 'rgba(0, 74, 153, 1)',
                borderWidth: 2,
                pointBackgroundColor: 'rgba(0, 74, 153, 1)'
            }]
        },
        options: {
            scales: { r: { min: 0, max: 100, ticks: { display: false } } },
            plugins: { legend: { display: false } }
        }
    });

    function updateCalculations() {
        // Retrieve values and ensure they stay within 0-100 range
        const getVal = (id) => Math.min(100, Math.max(0, parseInt(document.getElementById(id).value) || 0));
        
        const C = getVal('cognition');
        const CF = getVal('endurance');
        const SP = getVal('sensation');
        const FAC = getVal('mobility');
        const TS = getVal('stiffness');
        const M = getVal('movement');
        const F = getVal('daily_living');

        // Update Spider Chart (Stiffness is inverted so more area = better)
        spiderChart.data.datasets[0].data = [C, CF, SP, FAC, 100 - TS, M, F];
        spiderChart.update();

        // Standardized formulas from neuro evaluation draft 2.pdf[cite: 2]
        const ME = M * (1 - (TS / 200)); 
        const RPI = (0.30 * C) + (0.25 * CF) + (0.20 * SP) + (0.15 * FAC) + (0.10 * (100 - TS));
        const GRS = (0.20 * C) + (0.30 * F) + (0.20 * ME) + (0.15 * FAC) + (0.10 * SP) + (0.05 * CF);

        document.getElementById('rpi-score').innerText = RPI.toFixed(1);
        document.getElementById('grs-score').innerText = GRS.toFixed(1);

        // Interpretation Logic[cite: 2]
        const rpiElem = document.getElementById('rpi-category');
        if (RPI < 40) { rpiElem.innerText = 'Low Potential'; rpiElem.className = 'result-category cat-low'; }
        else if (RPI <= 70) { rpiElem.innerText = 'Moderate Potential'; rpiElem.className = 'result-category cat-mod'; }
        else { rpiElem.innerText = 'High Potential'; rpiElem.className = 'result-category cat-high'; }

        const grsElem = document.getElementById('grs-category');
        if (GRS <= 50) { grsElem.innerText = 'Early Recovery Stage'; grsElem.className = 'result-category cat-low'; }
        else if (GRS <= 75) { grsElem.innerText = 'Moderate Recovery Stage'; grsElem.className = 'result-category cat-mod'; }
        else { grsElem.innerText = 'High Recovery Stage'; grsElem.className = 'result-category cat-high'; }
    }

    updateCalculations();
</script>

</body>
</html>
